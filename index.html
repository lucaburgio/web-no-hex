<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Strategic</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      const theme = new URLSearchParams(location.search).get('theme');
      if (theme) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `public/themes/theme-${theme}.css`;
        document.currentScript.parentNode.appendChild(link);
      }
    })();
  </script>
</head>
<body>
  <header id="conquer-header">
    <div id="pp-info">
      <img src="public/icons/points.svg" id="header-pp-icon" alt="PP" />
      <strong id="pp-display">0</strong>
    </div>
    <div id="header-territory">
      <span class="conquer-pct" id="player-conquer-pct">0%</span>
      <div id="conquer-bar-line"></div>
      <span class="conquer-pct" id="ai-conquer-pct">0%</span>
    </div>
    <button id="rules-btn">FULL RULES</button>
  </header>

  <div id="game-area">
    <div id="board-wrap">
      <svg id="board"></svg>
    </div>
  </div>

  <!-- Hidden state elements required by JS -->
  <div id="hud-hidden">
    <strong id="turn"></strong>
    <strong id="phase"></strong>
    <ul id="log"></ul>
    <input type="checkbox" id="auto-end-production" />
    <input type="checkbox" id="auto-end-movement" />
    <span id="player-conquer-label"></span>
    <span id="ai-conquer-label"></span>
  </div>

  <!-- Unit picker: card tray shown during production -->
  <div id="unit-picker">
    <div id="unit-picker-list"></div>
  </div>

  <!-- Sticky footer -->
  <footer id="game-footer">
    <div id="footer-left">
    </div>
    <div id="footer-right">
      <span id="phase-label"></span>
      <button id="end-move-btn">NEXT</button>
    </div>
  </footer>

  <!-- Main menu overlay — shown on page load -->
  <div id="main-menu-overlay">
    <div id="main-menu-left">
      <div id="main-menu-title">WEB<br>STRATEGIC</div>
    </div>
    <div id="main-menu-right">
      <button id="menu-continue-btn" class="menu-btn hidden">CONTINUE</button>
      <button id="menu-new-game-btn" class="menu-btn">NEW GAME</button>
      <button id="menu-host-btn" class="menu-btn">HOST GAME</button>
      <button id="menu-join-btn" class="menu-btn">JOIN GAME</button>
      <p class="menu-version-text">v0.1 — BETA</p>
    </div>
  </div>

  <!-- Confirm new game (when a save exists) -->
  <div id="new-game-confirm-overlay" class="hidden">
    <div id="new-game-confirm-modal">
      <p class="confirm-text">Start a new game?<br>Your current progress will be lost.</p>
      <div class="confirm-actions">
        <button id="confirm-new-game-btn" class="menu-btn">YES, NEW GAME</button>
        <button id="cancel-new-game-btn" class="menu-btn secondary">CANCEL</button>
      </div>
    </div>
  </div>

  <!-- Intro story overlay — shown before the first new game -->
  <div id="intro-overlay" class="hidden">
    <div id="intro-page">
      <div id="intro-text-block">
        <p id="intro-text"></p><span id="intro-cursor">|</span>
      </div>
      <div id="intro-nav">
        <button id="intro-continue-btn" class="menu-btn hidden">CONTINUE</button>
      </div>
    </div>
  </div>

  <div id="lobby-overlay" class="hidden">
    <div id="lobby-modal">
      <div id="lobby-title">WEB STRATEGIC</div>

      <div id="lobby-menu">
        <button id="vsai-btn" class="lobby-btn">vs AI</button>
        <button id="host-btn" class="lobby-btn">Host Game</button>
        <button id="join-btn" class="lobby-btn">Join Game</button>
      </div>

      <div id="lobby-host-wait" class="hidden">
        <div class="lobby-label">Room code</div>
        <div id="lobby-code">···</div>
        <div class="lobby-hint">Share this code with your opponent</div>
        <div class="lobby-hint" id="lobby-waiting-text">Waiting for opponent...</div>
        <button id="lobby-cancel-btn" class="lobby-btn secondary">Cancel</button>
      </div>

      <div id="lobby-join-form" class="hidden">
        <div class="lobby-label">Enter room code</div>
        <input id="lobby-code-input" placeholder="XXXXXX" maxlength="6" autocomplete="off" />
        <button id="lobby-join-confirm" class="lobby-btn">Join</button>
        <button id="lobby-cancel-join-btn" class="lobby-btn secondary">Cancel</button>
      </div>

      <div id="lobby-error" class="hidden"></div>
    </div>
  </div>

  <div id="overlay" class="hidden">
    <div id="overlay-msg"></div>
    <div id="overlay-actions">
      <button id="restart-btn">Restart</button>
      <button id="recap-btn">View Replay</button>
    </div>
  </div>

  <div id="recap-overlay" class="hidden">
    <div id="recap-header">
      <button id="recap-close-btn">&#x2715; Back</button>
      <span id="recap-turn-label">TURN 1</span>
      <div id="recap-header-right"></div>
    </div>
    <div id="recap-board-wrap">
      <svg id="recap-board"></svg>
    </div>
    <div id="recap-footer">
      <input type="range" id="recap-slider" min="0" value="0" step="1" />
      <ul id="recap-log"></ul>
    </div>
  </div>

  <div id="rules-overlay" class="hidden">
    <div id="rules-modal">
      <button id="rules-close">✕ Close</button>
      <div id="rules-content"></div>
    </div>
  </div>

  <!-- Pause modal (opened with ESC during a game) -->
  <div id="pause-overlay" class="hidden">
    <div id="pause-modal">
      <button id="pause-return-btn" class="menu-btn">RETURN TO MAIN MENU</button>
      <button id="pause-continue-btn" class="menu-btn secondary">CONTINUE</button>
    </div>
  </div>

  <div id="combat-tooltip" class="tooltip hidden"></div>

  <div id="pp-tooltip" class="tooltip hidden"></div>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
