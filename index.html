<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Strategic</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      const theme = new URLSearchParams(location.search).get('theme');
      if (theme) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `public/themes/theme-${theme}.css`;
        document.currentScript.parentNode.appendChild(link);
      }
    })();
  </script>
</head>
<body>
  <div id="game-area">
    <div id="board-wrap">
      <svg id="board"></svg>
    </div>
  </div>

  <!-- Hidden state elements required by JS -->
  <div id="hud-hidden">
    <strong id="turn"></strong>
    <strong id="phase"></strong>
    <ul id="log"></ul>
    <input type="checkbox" id="auto-end-production" />
    <input type="checkbox" id="auto-end-movement" />
  </div>

  <!-- Unit picker: floating panel shown during production -->
  <div class="panel" id="unit-picker">
    <h2>Build Unit</h2>
    <div id="unit-picker-hex"></div>
    <div id="unit-picker-list"></div>
  </div>

  <!-- Sticky footer -->
  <footer id="game-footer">
    <div id="footer-left">
      <div id="pp-info">
        <strong id="pp-display">0</strong>
        <span id="pp-label">PRODUCTION<br>POINTS</span>
      </div>
      <button id="rules-btn">FULL RULES</button>
    </div>
    <div id="footer-right">
      <span id="phase-label"></span>
      <button id="end-move-btn">&rsaquo;&rsaquo;&rsaquo;</button>
    </div>
  </footer>

  <div id="overlay" class="hidden">
    <div id="overlay-msg"></div>
    <button id="restart-btn">Restart</button>
  </div>

  <div id="rules-overlay" class="hidden">
    <div id="rules-modal">
      <button id="rules-close">✕ Close</button>
      <div id="rules-content"></div>
    </div>
  </div>

  <div id="combat-tooltip" class="hidden"></div>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
