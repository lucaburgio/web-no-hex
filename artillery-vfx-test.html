<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artillery projectile VFX — proposals</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: linear-gradient(165deg, #1a1d24 0%, #0e1014 100%);
      color: #e8eaef;
    }
    header {
      padding: 1.25rem 1.5rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    header p {
      margin: 0;
      font-size: 0.85rem;
      opacity: 0.72;
      max-width: 52rem;
      line-height: 1.45;
    }
    #panels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      padding: 1rem 1.5rem 2rem;
    }
    .panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
    }
    .panel h2 {
      margin: 0;
      padding: 0.65rem 0.85rem;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .panel p.desc {
      margin: 0;
      padding: 0.5rem 0.85rem 0.65rem;
      font-size: 0.8rem;
      line-height: 1.4;
      opacity: 0.85;
    }
    .panel svg {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 4 / 3;
      background: radial-gradient(ellipse 80% 70% at 50% 55%, #2a3140 0%, #1e232c 45%, #14181f 100%);
    }
  </style>
</head>
<body>
  <header>
    <h1>Defender hex — shell barrage (direct streak)</h1>
    <p>
      Six short streaks per variant, all localized on the target hex (no line from attacker).
      Staggered auto-play on load. Edit presets in
      <code style="background:rgba(255,255,255,0.08);padding:0.1em 0.35em;border-radius:4px;">src/artilleryProjectileVfx.ts</code>
      (<code>playDefenderHexBarrage</code>).
    </p>
  </header>
  <div id="panels"></div>
  <script type="module" src="/src/artillery-vfx-test.ts"></script>
</body>
</html>
